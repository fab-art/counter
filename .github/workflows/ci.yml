name: CI

on:
  push:
    branches: [ main, master, sprint-1-foundation* ]
  pull_request:
    branches: [ main, master, sprint-1-foundation* ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json

    - name: Install dependencies
      run: npm install --prefix apps/web

    - name: Lint
      run: npm run lint --prefix apps/web

    - name: Run Vitest
      run: npm run test --prefix apps/web

    - name: Build
      run: npm run build --prefix apps/web
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:54321' }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy' }}
